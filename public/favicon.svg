  <circle cx="30" cy="53" r="2" fill="white" />

  <circle cx="70" cy="55" r="10" fill="white" />
  <circle cx="70" cy="55" r="5" fill="#1e293b" />
  <circle cx="70" cy="53" r="2" fill="white" />

  <!-- Smile (Grille) -->
